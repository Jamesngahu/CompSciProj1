<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - CBC-Bridge</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="navbar">
  <div class="logo">CBC-Bridge | System Admin</div>
  <nav>
    <ul>
      <li><span id="admin-greeting" class="greeting"></span></li>
      <li><a href="#" onclick="logout()" class="btn-logout">Logout</a></li>
    </ul>
  </nav>
</header>

<div class="dashboard-layout">
  <aside class="side-nav" id="side-nav"></aside>

  <main class="content-area">

    <section id="schools-section" class="content-view hidden">
      <h2>Pending Account Approvals (Schools)</h2>
      <div id="unapproved-schools-container" class="grid"></div>
    </section>

    <section id="educators-section" class="content-view hidden">
      <h2>Pending Educator Verifications</h2>
      <div id="unvetted-container" class="grid"></div>
    </section>

    <section id="users-section" class="content-view hidden">
      <h2>System User Directory</h2>
      <div class="panel panel-scroll-x">
        <table>
          <thead>
          <tr>
            <th>ID</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Role</th>
            <th>Status</th>
          </tr>
          </thead>
          <tbody id="users-table-body"></tbody>
        </table>
      </div>
    </section>

    <section id="admin-feedback-section" class="content-view hidden">
      <h2>User Feedback Inbox</h2>
      <div id="feedback-container" class="grid"></div>
    </section>

  </main>
</div>

<script src="js/config.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
