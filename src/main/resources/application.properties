# Server Port - fixed at 9090 to match the target port configured in
# Railway's Public Networking settings for this service.
server.port=9090

# PostgreSQL Database Configuration - set these as env vars in production.
# Railway's Postgres plugin exposes PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD;
# build SPRING_DATASOURCE_URL from those (see deployment notes).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cbc_portal}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# CORS - the deployed frontend origin(s) allowed to call this API. Comma-separated.
# Locally this defaults to common static-file dev ports.
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:5500,http://127.0.0.1:5500}

# Email (used to send login verification codes). Set these as env vars.
# Until they're set, login codes are printed to the server console/log instead.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=3000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=3000

# Bootstrap admin account (created/reset on every startup - see AdminSeeder).
# There is no UI/API path to create a SYSTEM_ADMIN, so this guarantees one always exists.
# Set these as env vars - the defaults below are only for first-time local setup.
app.admin.email=${ADMIN_EMAIL:admin@example.com}
app.admin.password=${ADMIN_PASSWORD:ChangeMe123!}
app.admin.full-name=${ADMIN_FULL_NAME:System Administrator}

# M-Pesa Daraja (SANDBOX only, test/demo mode).
# Successful donations are automatically reversed (refunded) so no real money is
# ever retained - see MpesaService.reverseTransaction.
#
# Setup required before this works:
# 1. Create a sandbox app at https://developer.safaricom.co.ke and set
#    MPESA_CONSUMER_KEY / MPESA_CONSUMER_SECRET as env vars.
# 2. Set MPESA_CALLBACK_BASE_URL to your public backend URL (the Railway URL
#    once deployed, or an ngrok tunnel for local testing).
# 3. Download the sandbox public certificate from the Daraja portal's "Test
#    Credentials" page and save it as src/main/resources/mpesa/SandboxCertificate.cer
mpesa.base-url=${MPESA_BASE_URL:https://sandbox.safaricom.co.ke}
mpesa.consumer-key=${MPESA_CONSUMER_KEY:}
mpesa.consumer-secret=${MPESA_CONSUMER_SECRET:}
mpesa.shortcode=${MPESA_SHORTCODE:174379}
mpesa.passkey=${MPESA_PASSKEY:bfb279f9aa9bdbcf158e97dd71a467cd2e0c893059b10f78e6b72ada1ed2c919}
mpesa.callback-base-url=${MPESA_CALLBACK_BASE_URL:https://CHANGE-ME.ngrok-free.app}
mpesa.initiator-name=${MPESA_INITIATOR_NAME:testapi}
mpesa.initiator-password=${MPESA_INITIATOR_PASSWORD:Safaricom999!*!}
mpesa.cert-path=mpesa/SandboxCertificate.cer
